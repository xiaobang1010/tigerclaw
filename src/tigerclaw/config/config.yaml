# 配置优先级: 环境变量 > YAML 配置文件 > 默认值

# 应用配置
app_name: TigerClaw
debug: false

# 网关配置
gateway:
  # 网关服务端口 (默认: 18789)
  port: 18789
  # 网关服务主机地址
  host: 127.0.0.1
  # 绑定模式: auto, lan, loopback, custom, tailnet
  bind: loopback

# 模型配置
model:
  # 默认使用的模型
  default_model: anthropic/claude-sonnet-4-6
  # 模型提供商配置
  providers:
    anthropic:
      base_url: https://api.anthropic.com
      # api_key 建议通过环境变量 TIGERCLAW_MODEL__PROVIDERS__ANTHROPIC__API_KEY 设置
      models:
        - claude-opus-4-6
        - claude-sonnet-4-6
    openai:
      base_url: https://api.openai.com/v1
      models:
        - gpt-5.4
        - gpt-5-mini
    google:
      base_url: https://generativelanguage.googleapis.com/v1beta
      models:
        - gemini-3.1-pro-preview
        - gemini-3-flash-preview

# 通道配置
channel:
  # 启用的通道列表
  enabled_channels:
    - slack
    - telegram
    - discord
    - irc
